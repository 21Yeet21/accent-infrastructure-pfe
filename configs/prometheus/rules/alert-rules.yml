groups:
  - name: s1-alerts
    interval: 60s
    rules:
      - alert: S1_CPU_High
        expr: 100 - (avg(rate(node_cpu_seconds_total{job="s1-node", mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          host: s1
        annotations:
          summary: "CPU usage élevé sur S1 (> 85%)"
          description: "L'utilisation CPU de S1 dépasse 85% depuis 5 minutes. Valeur actuelle : {{ $value | printf \"%.1f\" }}%"

      - alert: S1_RAM_High
        expr: (1 - (node_memory_MemAvailable_bytes{job="s1-node"} / node_memory_MemTotal_bytes{job="s1-node"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
          host: s1
        annotations:
          summary: "Utilisation RAM élevée sur S1 (> 85%)"
          description: "L'utilisation RAM de S1 dépasse 85% depuis 5 minutes. Valeur actuelle : {{ $value | printf \"%.1f\" }}%"

      - alert: S1_Disk_Critical
        expr: 100 - ((node_filesystem_avail_bytes{job="s1-node", mountpoint="/"} / node_filesystem_size_bytes{job="s1-node", mountpoint="/"}) * 100) > 90
        for: 5m
        labels:
          severity: critical
          host: s1
        annotations:
          summary: "Espace disque critique sur S1 (> 90%)"
          description: "L'espace disque de S1 dépasse 90% d'utilisation. Valeur actuelle : {{ $value | printf \"%.1f\" }}%"

      - alert: S1_Down
        expr: up{job="s1-node"} == 0
        for: 1m
        labels:
          severity: critical
          host: s1
        annotations:
          summary: "S1 indisponible"
          description: "Node Exporter sur S1 ne répond pas depuis plus d'une minute."

