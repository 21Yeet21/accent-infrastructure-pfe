apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: PBFA97CFB590B2093
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: P8E80F9AEF21F6940
    editable: false
    jsonData:
      derivedFields:
        - datasourceUid: P214B5B846CF3925F
          matcherRegex: '"traceId":"(\w+)"'
          name: TraceID
          url: '$${__value.raw}'

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: P214B5B846CF3925F
    editable: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: PBFA97CFB590B2093
      tracesToLogs:
        datasourceUid: P8E80F9AEF21F6940
        filterByTraceID: true
        filterBySpanID: false
        tags: [{ key: 'service.name', value: 'job' }]